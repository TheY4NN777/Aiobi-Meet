# =============================================================================
# Aïobi Meet — GitLab CI/CD Pipeline
# =============================================================================
# Runner  : dev-serv-runner (tags: dev, docker) sur le serveur de staging
# Strategie : Build et deploy sur le meme serveur (pas de registry externe)
# =============================================================================

stages:
  - build
  - deploy

variables:
  DOCKER_HOST: unix:///var/run/docker.sock

# =============================================================================
# BUILD — Construit les images Docker sur le serveur
# =============================================================================

build-backend:
  stage: build
  tags:
    - dev
    - docker
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - docker build
      --target backend-production
      --tag aiobi-meet/backend:${CI_COMMIT_SHORT_SHA}
      --tag aiobi-meet/backend:latest
      .
  only:
    - develop

build-frontend:
  stage: build
  tags:
    - dev
    - docker
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - docker build
      --file docker/aiobi-frontend/Dockerfile
      --target frontend-production
      --tag aiobi-meet/frontend:${CI_COMMIT_SHORT_SHA}
      --tag aiobi-meet/frontend:latest
      .
  only:
    - develop

# =============================================================================
# DEPLOY — Deploie le staging sur le serveur
# =============================================================================

deploy-staging:
  stage: deploy
  tags:
    - dev
    - docker
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - apk add --no-cache docker-compose docker-cli-compose
  script:
    - cd docker/staging

    # Generer le .env depuis les variables CI/CD
    - echo "MEET_HOST=${MEET_HOST}" > .env
    - echo "LIVEKIT_HOST=${LIVEKIT_HOST}" >> .env
    - echo "DUCKDNS_TOKEN=${DUCKDNS_TOKEN}" >> .env
    - echo "LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}" >> .env
    - echo "LETSENCRYPT_TEST=${LETSENCRYPT_TEST}" >> .env
    - echo "DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}" >> .env
    - echo "POSTGRES_DB=${POSTGRES_DB}" >> .env
    - echo "POSTGRES_USER=${POSTGRES_USER}" >> .env
    - echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" >> .env
    - echo "KC_POSTGRES_DB=${KC_POSTGRES_DB}" >> .env
    - echo "KC_POSTGRES_USER=${KC_POSTGRES_USER}" >> .env
    - echo "KC_POSTGRES_PASSWORD=${KC_POSTGRES_PASSWORD}" >> .env
    - echo "KC_BOOTSTRAP_ADMIN_USERNAME=${KC_BOOTSTRAP_ADMIN_USERNAME}" >> .env
    - echo "KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_BOOTSTRAP_ADMIN_PASSWORD}" >> .env
    - echo "OIDC_RP_CLIENT_ID=${OIDC_RP_CLIENT_ID}" >> .env
    - echo "OIDC_RP_CLIENT_SECRET=${OIDC_RP_CLIENT_SECRET}" >> .env
    - echo "LIVEKIT_API_KEY=${LIVEKIT_API_KEY}" >> .env
    - echo "LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}" >> .env
    - echo "REALM_NAME=${REALM_NAME}" >> .env
    - echo "DOCKER_USER=${DOCKER_USER}" >> .env

    # Creer les reseaux si necessaire
    - docker network create proxy-tier 2>/dev/null || true
    - docker network create staging-app 2>/dev/null || true

    # Deployer dans l'ordre
    - docker compose -f compose.nginx-proxy.yaml up -d
    - docker compose -f compose.keycloak.yaml up -d
    - docker compose -f compose.yaml up -d

    # Attendre le backend
    - |
      for i in $(seq 1 30); do
        if docker compose -f compose.yaml exec -T backend python manage.py check 2>/dev/null; then
          echo "Backend is healthy!"
          break
        fi
        echo "Waiting... ($i/30)"
        sleep 5
      done

    # Migrations automatiques
    - docker compose -f compose.yaml exec -T backend python manage.py migrate --noinput
  environment:
    name: staging
    url: https://aiobi-meet.duckdns.org
  only:
    - develop
  needs:
    - build-backend
    - build-frontend

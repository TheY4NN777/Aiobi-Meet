# =============================================================================
# Aiobi Meet — GitLab CI/CD Pipeline
# =============================================================================
#
# Deux environnements :
#   - STAGING  : push sur develop → build local + deploy sur le serveur de staging
#   - PRODUCTION : push sur main → build + push GitLab Registry + deploy sur le serveur de prod
#
# Runners :
#   - dev-serv-runner (tags: dev, docker) — serveur de staging
#   - aiobi-master-prod (tags: aiobi-prod, docker) — serveur de production
#
# Prerequis runner config.toml (staging) :
#   volumes = ["/var/run/docker.sock:/var/run/docker.sock",
#              "/home/ogu/theY4NN/AïobiMeet:/home/ogu/theY4NN/AïobiMeet",
#              "/cache"]
#
# Prerequis runner config.toml (production) :
#   volumes = ["/var/run/docker.sock:/var/run/docker.sock",
#              "/opt/aiobi-meet:/opt/aiobi-meet",
#              "/cache"]
#
# Le .env doit etre present sur chaque serveur dans le repertoire de deploy
# =============================================================================

stages:
  - build
  - deploy

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  STAGING_DIR: /home/ogu/theY4NN/AïobiMeet/docker/staging
  PRODUCTION_DIR: /opt/aiobi-meet/production

# =============================================================================
# ========================== STAGING (develop) ================================
# =============================================================================
# Build local sur le serveur de staging (pas de registry).
# --no-cache garantit que les assets (logo, favicons, config) sont toujours
# a jour. Le build prend plus de temps mais evite les problemes de cache.
# =============================================================================

build-backend-staging:
  stage: build
  tags:
    - dev
    - docker
  image: docker:27
  script:
    - docker build
      --no-cache
      --target backend-production
      --tag aiobi-meet/backend:${CI_COMMIT_SHORT_SHA}
      --tag aiobi-meet/backend:latest
      .
  only:
    - develop

build-frontend-staging:
  stage: build
  tags:
    - dev
    - docker
  image: docker:27
  script:
    - docker build
      --no-cache
      --file docker/aiobi-frontend/Dockerfile
      --target frontend-production
      --tag aiobi-meet/frontend:${CI_COMMIT_SHORT_SHA}
      --tag aiobi-meet/frontend:latest
      .
  only:
    - develop

build-summary-staging:
  stage: build
  tags:
    - dev
    - docker
  image: docker:27
  script:
    - docker build
      --no-cache
      --file src/summary/Dockerfile
      --target production
      --tag aiobi-meet/summary:${CI_COMMIT_SHORT_SHA}
      --tag aiobi-meet/summary:latest
      src/summary
  only:
    - develop

# =============================================================================
# DEPLOY STAGING
# =============================================================================
# Strategie de deploy :
#   1. nginx-proxy et acme-companion ne sont JAMAIS recreees (preserve les
#      certificats TLS dans les volumes Docker). "up -d" est un no-op si
#      le conteneur tourne deja.
#   2. keycloak est demarre sans --force-recreate (preserve les sessions
#      et la DB). Recree seulement si le compose change.
#   3. Les conteneurs applicatifs (backend, frontend, celery, livekit) sont
#      force-recreated pour prendre les nouvelles images et le .env a jour.
#   4. Apres le deploy, on verifie que les certificats TLS sont presents.
#      Si absents (premier deploy ou volumes perdus), on attend que
#      acme-companion les genere.
# =============================================================================

deploy-staging:
  stage: deploy
  tags:
    - dev
    - docker
  image: docker:27
  before_script:
    - apk add --no-cache docker-cli-compose curl
  script:
    # --- Copier les fichiers staging du CI vers le host (sauf .env) ----------
    - export HOST_STAGING=/home/ogu/theY4NN/AïobiMeet/docker/staging
    - export HOST_PROJECT=/home/ogu/theY4NN/AïobiMeet
    - cp docker/staging/compose*.yaml $HOST_STAGING/
    - cp docker/staging/default.conf.template $HOST_STAGING/
    - cp docker/staging/livekit-server.yaml $HOST_STAGING/
    - cp docker/staging/livekit-egress.yaml $HOST_STAGING/
    # Injecter les secrets dans la config egress
    - sed -i "s|__LIVEKIT_API_SECRET__|${LIVEKIT_API_SECRET}|g" $HOST_STAGING/livekit-egress.yaml
    - sed -i "s|__MINIO_ACCESS_KEY__|${POSTGRES_USER}|g" $HOST_STAGING/livekit-egress.yaml
    - sed -i "s|__MINIO_SECRET_KEY__|${POSTGRES_PASSWORD}|g" $HOST_STAGING/livekit-egress.yaml
    - cp docker/staging/env.d/* $HOST_STAGING/env.d/

    # --- Injecter les variables email CI dans env.d/common (ecrase les defaults) ---
    - |
      if [ -n "$DJANGO_EMAIL_HOST" ]; then
        sed -i "s|^DJANGO_EMAIL_HOST=.*|DJANGO_EMAIL_HOST=$DJANGO_EMAIL_HOST|" $HOST_STAGING/env.d/common
        sed -i "s|^DJANGO_EMAIL_PORT=.*|DJANGO_EMAIL_PORT=$DJANGO_EMAIL_PORT|" $HOST_STAGING/env.d/common
        sed -i "s|^DJANGO_EMAIL_FROM=.*|DJANGO_EMAIL_FROM=$DJANGO_EMAIL_FROM|" $HOST_STAGING/env.d/common
        sed -i "s|^DJANGO_EMAIL_BRAND_NAME=.*|DJANGO_EMAIL_BRAND_NAME=\"$DJANGO_EMAIL_BRAND_NAME\"|" $HOST_STAGING/env.d/common
        sed -i "s|^DJANGO_EMAIL_DOMAIN=.*|DJANGO_EMAIL_DOMAIN=$DJANGO_EMAIL_DOMAIN|" $HOST_STAGING/env.d/common
        sed -i "s|^DJANGO_EMAIL_APP_BASE_URL=.*|DJANGO_EMAIL_APP_BASE_URL=$DJANGO_EMAIL_APP_BASE_URL|" $HOST_STAGING/env.d/common
        # Ajouter les variables qui n'existent pas dans le fichier par defaut
        echo "DJANGO_EMAIL_USE_SSL=$DJANGO_EMAIL_USE_SSL" >> $HOST_STAGING/env.d/common
        echo "DJANGO_EMAIL_USE_TLS=$DJANGO_EMAIL_USE_TLS" >> $HOST_STAGING/env.d/common
        echo "DJANGO_EMAIL_HOST_USER=$DJANGO_EMAIL_HOST_USER" >> $HOST_STAGING/env.d/common
        echo "DJANGO_EMAIL_HOST_PASSWORD=$DJANGO_EMAIL_HOST_PASSWORD" >> $HOST_STAGING/env.d/common
        echo "=== Email config injected from CI variables ==="
      fi

    # --- Injecter les tokens IA/recording dans le .env staging -----------------
    - |
      for VAR_NAME in SUMMARY_API_TOKEN RECORDING_STORAGE_EVENT_TOKEN; do
        eval VAR_VALUE=\$$VAR_NAME
        if [ -n "$VAR_VALUE" ]; then
          if grep -q "^${VAR_NAME}=" $HOST_STAGING/.env 2>/dev/null; then
            sed -i "s|^${VAR_NAME}=.*|${VAR_NAME}=${VAR_VALUE}|" $HOST_STAGING/.env
          else
            echo "${VAR_NAME}=${VAR_VALUE}" >> $HOST_STAGING/.env
          fi
          echo "=== ${VAR_NAME} injected ==="
        fi
      done

    - mkdir -p $HOST_STAGING/vhost.d
    - cp docker/staging/vhost.d/* $HOST_STAGING/vhost.d/
    - cp docker/auth/realm.json $HOST_PROJECT/docker/auth/realm.json
    - cp -r docker/keycloak/themes/aiobi/. $HOST_PROJECT/docker/keycloak/themes/aiobi/

    # --- Se placer dans le staging du host -----------------------------------
    - cd $HOST_STAGING

    # --- 1. nginx-proxy (ne jamais forcer la recreation) ---------------------
    - echo "=== Deploying nginx-proxy (preserve TLS certs) ==="
    - docker compose -f compose.nginx-proxy.yaml up -d

    # --- 2. Keycloak (always force-recreate on staging to pick up theme/env changes) ---
    - echo "=== Deploying Keycloak (force-recreate) ==="
    - docker compose -f compose.keycloak.yaml up -d --force-recreate keycloak

    # --- 3. App containers (compose recreates only services whose image tag or env changed) ---
    # NB: pas de --force-recreate pour preserver les services stateful (Redis, Postgres, MinIO)
    # qui ne changent pas entre deploys. IMAGE_TAG=${CI_COMMIT_SHORT_SHA} assure que les
    # services applicatifs (backend, frontend, celery, summary) sont bien recrees.
    - echo "=== Deploying app containers ==="
    - docker compose -f compose.yaml up -d

    # --- 4. Attendre le backend ----------------------------------------------
    - echo "=== Waiting for backend health check ==="
    - |
      for i in $(seq 1 30); do
        if docker compose -f compose.yaml exec -T backend python manage.py check 2>/dev/null; then
          echo "Backend is healthy!"
          break
        fi
        echo "Waiting... ($i/30)"
        sleep 5
      done

    # --- 5. Migrations automatiques ------------------------------------------
    - docker compose -f compose.yaml exec -T backend python manage.py migrate --noinput

    # --- 6. Verifier et reparer les certificats TLS ---------------------------
    - echo "=== Checking TLS certificates ==="
    - |
      CERT_OK=false
      for i in $(seq 1 12); do
        if docker exec nginx-proxy-acme sh -c "test -f /etc/nginx/certs/aiobi-meet.duckdns.org/fullchain.pem" 2>/dev/null; then
          echo "TLS certificate files found!"
          CERT_OK=true
          break
        fi
        echo "Waiting for TLS certs... ($i/12, next check in 10s)"
        sleep 10
      done

      if [ "$CERT_OK" = "true" ]; then
        echo "Ensuring nginx-proxy symlinks are correct..."
        docker exec nginx-proxy-acme sh -c '
          cd /etc/nginx/certs
          for domain in aiobi-meet.duckdns.org aiobi-livekit.duckdns.org; do
            if [ -d "$domain" ] && [ -f "${domain}/fullchain.pem" ]; then
              rm -f ${domain}.crt ${domain}.key ${domain}.chain.pem
              ln -s ./${domain}/fullchain.pem ${domain}.crt
              ln -s ./${domain}/key.pem ${domain}.key
              ln -s ./${domain}/chain.pem ${domain}.chain.pem
              echo "  ${domain}: symlinks OK"
            fi
          done
          rm -rf _test_*
          if [ ! -f dhparam.pem ]; then
            openssl dhparam -out dhparam.pem 2048 2>/dev/null
          fi
          for domain in aiobi-meet.duckdns.org aiobi-livekit.duckdns.org; do
            if [ ! -L ${domain}.dhparam.pem ]; then
              ln -s ./dhparam.pem ${domain}.dhparam.pem
            fi
          done
        '
        docker exec nginx-proxy nginx -s reload 2>/dev/null || true
        echo "TLS certificates ready and nginx reloaded."
      else
        echo "No TLS certs found. Forcing acme-companion to re-register..."
        docker restart nginx-proxy-acme
        sleep 30
        if docker exec nginx-proxy-acme sh -c "test -f /etc/nginx/certs/aiobi-meet.duckdns.org/fullchain.pem" 2>/dev/null; then
          echo "Certs generated after restart!"
          docker exec nginx-proxy-acme sh -c '
            cd /etc/nginx/certs
            for domain in aiobi-meet.duckdns.org aiobi-livekit.duckdns.org; do
              if [ -d "$domain" ] && [ -f "${domain}/fullchain.pem" ]; then
                rm -f ${domain}.crt ${domain}.key ${domain}.chain.pem
                ln -s ./${domain}/fullchain.pem ${domain}.crt
                ln -s ./${domain}/key.pem ${domain}.key
                ln -s ./${domain}/chain.pem ${domain}.chain.pem
              fi
            done
            rm -rf _test_*
          '
          docker exec nginx-proxy nginx -s reload 2>/dev/null || true
        else
          echo "ERROR: TLS certificates could not be generated."
          echo "Check: docker logs nginx-proxy-acme"
          exit 1
        fi
      fi

    # --- 7. Configuration Keycloak post-deploy ---------------------------------
    - echo "=== Configuring Keycloak (OIDC client, locale, redirect URIs) ==="
    - |
      # Keycloak parses smtpServer booleans in lowercase only ("true"/"false").
      # Django-style "True"/"False" would be treated as false and break SSL/STARTTLS.
      EMAIL_SSL_LC=$(echo "${DJANGO_EMAIL_USE_SSL:-false}" | tr '[:upper:]' '[:lower:]')
      EMAIL_TLS_LC=$(echo "${DJANGO_EMAIL_USE_TLS:-false}" | tr '[:upper:]' '[:lower:]')
      echo "Waiting for Keycloak to be ready..."
      for i in $(seq 1 30); do
        if docker compose -f compose.keycloak.yaml exec -T keycloak curl -sf http://localhost:8080/realms/meet > /dev/null 2>&1; then
          echo "Keycloak realm meet is ready!"
          break
        fi
        echo "Waiting for Keycloak... ($i/30)"
        sleep 5
      done

      TOKEN=$(docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
        'curl -sf -X POST "http://localhost:8080/realms/master/protocol/openid-connect/token" \
        -d "client_id=admin-cli" \
        -d "username=$KEYCLOAK_ADMIN" \
        -d "password=$KEYCLOAK_ADMIN_PASSWORD" \
        -d "grant_type=password"' | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

      if [ -n "$TOKEN" ]; then
        CLIENT_UUID=$(docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
          "curl -sf 'http://localhost:8080/admin/realms/meet/clients' \
          -H 'Authorization: Bearer $TOKEN'" | grep -o '"id":"[^"]*","clientId":"meet"' | grep -o '"id":"[^"]*"' | cut -d'"' -f4)

        if [ -n "$CLIENT_UUID" ]; then
          docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
            "curl -sf -X PUT 'http://localhost:8080/admin/realms/meet/clients/$CLIENT_UUID' \
            -H 'Authorization: Bearer $TOKEN' \
            -H 'Content-Type: application/json' \
            -d '{
              \"id\":\"$CLIENT_UUID\",
              \"clientId\":\"meet\",
              \"secret\":\"${OIDC_RP_CLIENT_SECRET}\",
              \"rootUrl\":\"https://${MEET_HOST}:8443\",
              \"baseUrl\":\"https://${MEET_HOST}:8443/\",
              \"redirectUris\":[\"https://${MEET_HOST}:8443/*\",\"http://localhost:3000/*\",\"http://localhost:8070/*\"],
              \"webOrigins\":[\"https://${MEET_HOST}:8443\",\"http://localhost:3000\",\"http://localhost:8070\"],
              \"attributes\":{\"post.logout.redirect.uris\":\"https://${MEET_HOST}:8443/*\"}
            }'" && echo "  Client secret + URIs updated"

          docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
            "curl -sf -X PUT 'http://localhost:8080/admin/realms/meet' \
            -H 'Authorization: Bearer $TOKEN' \
            -H 'Content-Type: application/json' \
            -d '{
              \"defaultLocale\":\"fr\",
              \"internationalizationEnabled\":true,
              \"supportedLocales\":[\"fr\"],
              \"loginTheme\":\"aiobi\",
              \"emailTheme\":\"aiobi\",
              \"verifyEmail\":true,
              \"smtpServer\":{
                \"host\":\"${DJANGO_EMAIL_HOST}\",
                \"port\":\"${DJANGO_EMAIL_PORT}\",
                \"ssl\":\"${EMAIL_SSL_LC}\",
                \"starttls\":\"${EMAIL_TLS_LC}\",
                \"auth\":\"true\",
                \"user\":\"${DJANGO_EMAIL_HOST_USER}\",
                \"password\":\"${DJANGO_EMAIL_HOST_PASSWORD}\",
                \"from\":\"${DJANGO_EMAIL_FROM}\",
                \"fromDisplayName\":\"${DJANGO_EMAIL_BRAND_NAME}\",
                \"replyTo\":\"support@aiobi.world\"
              }
            }'" \
            && echo "  Realm: locale FR + aiobi themes + SMTP + verifyEmail applied"
        else
          echo "WARNING: Client 'meet' not found."
        fi
      else
        echo "WARNING: Could not get Keycloak admin token."
      fi

    # --- 8. DuckDNS cron (mise a jour IP automatique toutes les 5 min) --------
    - echo "=== Setting up DuckDNS cron ==="
    - |
      chmod +x $HOST_STAGING/duckdns-update.sh
      CRON_CMD="*/5 * * * * $HOST_STAGING/duckdns-update.sh >> /var/log/duckdns.log 2>&1"
      if ! crontab -l 2>/dev/null | grep -q "duckdns-update.sh"; then
        (crontab -l 2>/dev/null; echo "$CRON_CMD") | crontab -
        echo "DuckDNS cron installed."
      else
        echo "DuckDNS cron already exists."
      fi
      # Mise a jour immediate
      $HOST_STAGING/duckdns-update.sh || true

    # --- 9. Cleanup + Promote enterprise users (same file as prod) -------------
    - echo "=== Cleaning up and promoting enterprise users ==="
    - |
      if [ -f "$CI_PROJECT_DIR/docker/production/enterprise-users.txt" ]; then
        DOMAINS=$(grep -v '^\s*#' "$CI_PROJECT_DIR/docker/production/enterprise-users.txt" | grep -v '^\s*$' | grep '^@' | sed 's/^@//' | tr '\n' ',' | sed 's/,$//')
        EMAILS=$(grep -v '^\s*#' "$CI_PROJECT_DIR/docker/production/enterprise-users.txt" | grep -v '^\s*$' | grep -v '^@' | grep '@' | tr '\n' ',' | sed 's/,$//')
        docker compose -f compose.yaml exec -T backend python manage.py shell -c "
      from core.models import User
      domains = [d.strip() for d in '$DOMAINS'.split(',') if d.strip()]
      emails = [e.strip() for e in '$EMAILS'.split(',') if e.strip()]
      for u in User.objects.all():
          is_enterprise = any(u.email.endswith('@' + d) for d in domains) or u.email in emails
          if not is_enterprise:
              changed = u.account_tier == 'enterprise' or u.is_superuser or u.is_staff
              if changed:
                  User.objects.filter(pk=u.pk).update(account_tier='normal', is_superuser=False, is_staff=False)
                  print(f'{u.email} -> reset to normal')
      " 2>&1
        docker compose -f compose.yaml exec -T backend python manage.py shell -c "
      from core.models import User
      domains = [d.strip() for d in '$DOMAINS'.split(',') if d.strip()]
      emails = [e.strip() for e in '$EMAILS'.split(',') if e.strip()]
      for u in User.objects.all():
          is_enterprise = any(u.email.endswith('@' + d) for d in domains) or u.email in emails
          if is_enterprise:
              if u.account_tier != 'enterprise':
                  User.objects.filter(pk=u.pk).update(account_tier='enterprise')
                  print(f'{u.email} -> promoted to enterprise')
              else:
                  print(f'{u.email} -> already enterprise')
      " 2>&1
        echo "  Assigning enterprise role in Keycloak..."
        KC_TOKEN=$(docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
          'curl -sf -X POST "http://localhost:8080/realms/master/protocol/openid-connect/token" \
          -d "client_id=admin-cli" \
          -d "username=$KEYCLOAK_ADMIN" \
          -d "password=$KEYCLOAK_ADMIN_PASSWORD" \
          -d "grant_type=password"' | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
        if [ -n "$KC_TOKEN" ]; then
          docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
            "curl -sf -o /dev/null -w '%{http_code}' 'http://localhost:8080/admin/realms/meet/roles/enterprise' \
            -H 'Authorization: Bearer $KC_TOKEN'" | grep -q 200 || \
          docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
            "curl -sf -X POST 'http://localhost:8080/admin/realms/meet/roles' \
            -H 'Authorization: Bearer $KC_TOKEN' \
            -H 'Content-Type: application/json' \
            -d '{\"name\":\"enterprise\",\"description\":\"Enterprise tier\"}'" && echo "    Created enterprise role"
          ROLE_JSON=$(docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
            "curl -sf 'http://localhost:8080/admin/realms/meet/roles/enterprise' \
            -H 'Authorization: Bearer $KC_TOKEN'")
          for DOMAIN in $(echo "$DOMAINS" | tr ',' ' '); do
            USERS_JSON=$(docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
              "curl -sf 'http://localhost:8080/admin/realms/meet/users?max=500' \
              -H 'Authorization: Bearer $KC_TOKEN'")
            for USER_ID in $(echo "$USERS_JSON" | grep -o '"id":"[^"]*","createdTimestamp":[^,]*,"username":"[^"]*","enabled":[^,]*,"totp":[^,]*,"emailVerified":[^,]*,"firstName":"[^"]*","lastName":"[^"]*","email":"[^"]*@'"$DOMAIN"'"' | grep -o '"id":"[^"]*"' | cut -d'"' -f4); do
              docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
                "curl -sf -X POST 'http://localhost:8080/admin/realms/meet/users/$USER_ID/role-mappings/realm' \
                -H 'Authorization: Bearer $KC_TOKEN' \
                -H 'Content-Type: application/json' \
                -d '[$ROLE_JSON]'" 2>/dev/null
            done
            echo "    @$DOMAIN -> enterprise role assigned"
          done
        else
          echo "  WARNING: Could not get Keycloak admin token"
        fi
      else
        echo "  No enterprise-users.txt found, skipping"
      fi

    - echo "=== Deploy complete ==="

  environment:
    name: staging
    url: https://aiobi-meet.duckdns.org:8443
  only:
    - develop
  needs:
    - build-backend-staging
    - build-frontend-staging
    - build-summary-staging

# =============================================================================
# ========================== PRODUCTION (main) ================================
# =============================================================================
# Build + push au GitLab Container Registry, puis deploy par pull.
# --no-cache garantit que les assets sont a jour.
# =============================================================================

build-backend-prod:
  stage: build
  tags:
    - aiobi-prod
    - docker
  image: docker:27
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
      --no-cache
      --target backend-production
      --tag $CI_REGISTRY_IMAGE/backend:${CI_COMMIT_SHORT_SHA}
      --tag $CI_REGISTRY_IMAGE/backend:latest
      .
    - docker push $CI_REGISTRY_IMAGE/backend:${CI_COMMIT_SHORT_SHA}
    - docker push $CI_REGISTRY_IMAGE/backend:latest
  only:
    - main

build-frontend-prod:
  stage: build
  tags:
    - aiobi-prod
    - docker
  image: docker:27
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
      --no-cache
      --file docker/aiobi-frontend/Dockerfile
      --target frontend-production
      --build-arg VITE_GLITCHTIP_DSN_FRONTEND=${VITE_GLITCHTIP_DSN_FRONTEND}
      --tag $CI_REGISTRY_IMAGE/frontend:${CI_COMMIT_SHORT_SHA}
      --tag $CI_REGISTRY_IMAGE/frontend:latest
      .
    - docker push $CI_REGISTRY_IMAGE/frontend:${CI_COMMIT_SHORT_SHA}
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  only:
    - main

build-summary-prod:
  stage: build
  tags:
    - aiobi-prod
    - docker
  image: docker:27
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
      --no-cache
      --file src/summary/Dockerfile
      --target production
      --tag $CI_REGISTRY_IMAGE/summary:${CI_COMMIT_SHORT_SHA}
      --tag $CI_REGISTRY_IMAGE/summary:latest
      src/summary
    - docker push $CI_REGISTRY_IMAGE/summary:${CI_COMMIT_SHORT_SHA}
    - docker push $CI_REGISTRY_IMAGE/summary:latest
  only:
    - main

# =============================================================================
# DEPLOY PRODUCTION
# =============================================================================
# Strategie de deploy :
#   1. Generer .env depuis les variables CI/CD GitLab
#   2. Keycloak JAMAIS force-recreate (preserve sessions/DB)
#   3. App containers force-recreated (nouvelles images + env)
#   4. TLS geree par Traefik automatiquement (Let's Encrypt)
#
# Differences vs staging :
#   - Images pullees depuis le GitLab Registry (pas build local)
#   - Traefik existant sur le serveur (pas de nginx-proxy)
#   - .env genere par le CI (pas de fichier manuel sur le serveur)
#   - Reseau aiobi-public (Traefik) au lieu de proxy-tier
# =============================================================================

deploy-production:
  stage: deploy
  tags:
    - aiobi-prod
    - docker
  image: docker:27
  before_script:
    - apk add --no-cache docker-cli-compose curl
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # --- Copier les fichiers production du CI vers le host -------------------
    - export HOST_PROD=$PRODUCTION_DIR
    - export HOST_PROJECT=/opt/aiobi-meet
    - cp docker/production/compose*.yaml $HOST_PROD/
    - cp docker/production/default.conf.template $HOST_PROD/
    - cp docker/production/whisper-lb.conf $HOST_PROD/
    - cp docker/production/livekit-server.yaml $HOST_PROD/
    - cp docker/production/livekit-egress.yaml $HOST_PROD/
    # Stack observabilite — Prometheus config + Grafana provisioning + dashboards.
    # rsync -a --delete au lieu de rm -rf + cp -r :
    #   - preserve les inodes des dossiers existants = bind-mounts restent valides
    #     dans les containers qui les consomment (grafana, loki, promtail, prometheus)
    #   - --delete enleve les fichiers disparus du repo (equivalent cleanup de rm -rf)
    #   - update les fichiers modifies in-place + ajoute les nouveaux
    # Pourquoi pas rm -rf + cp -r : quand le dossier est recree, son inode change
    # mais les containers qui l'ont bind-mounte gardent l'ancienne reference =>
    # ils ne voient plus les nouveaux fichiers jusqu'a un force-recreate manuel.
    # Bug rencontre 2026-04-15 apres l'ajout de loki.yml + promtail-config.yml.
    - mkdir -p $HOST_PROD/monitoring
    - rsync -a --delete docker/production/monitoring/ $HOST_PROD/monitoring/
    # MinIO Prometheus JWT bearer token — required to scrape /minio/v2/metrics/cluster.
    # Token is generated once with `mc admin prometheus generate local` and stored
    # as masked CI variable MINIO_PROMETHEUS_TOKEN. If missing, write an empty file
    # so the bind-mount doesn't fail (scrape stays DOWN until var is populated).
    - |
      if [ -n "$MINIO_PROMETHEUS_TOKEN" ]; then
        echo "$MINIO_PROMETHEUS_TOKEN" > $HOST_PROD/monitoring/minio-token.txt
        chmod 600 $HOST_PROD/monitoring/minio-token.txt
        echo "  MinIO Prometheus token written"
      else
        touch $HOST_PROD/monitoring/minio-token.txt
        echo "  MINIO_PROMETHEUS_TOKEN not set — scrape will stay DOWN"
      fi
    # Injecter les secrets dans la config egress
    - sed -i "s|__LIVEKIT_API_SECRET__|${LIVEKIT_API_SECRET}|g" $HOST_PROD/livekit-egress.yaml
    - sed -i "s|__MINIO_ACCESS_KEY__|${POSTGRES_USER}|g" $HOST_PROD/livekit-egress.yaml
    - sed -i "s|__MINIO_SECRET_KEY__|${POSTGRES_PASSWORD}|g" $HOST_PROD/livekit-egress.yaml
    - cp docker/production/env.d/* $HOST_PROD/env.d/
    # Injecter les variables email CI dans env.d/common (remplace mailcatcher)
    - |
      if [ -n "$DJANGO_EMAIL_HOST" ]; then
        sed -i "s|^DJANGO_EMAIL_HOST=.*|DJANGO_EMAIL_HOST=$DJANGO_EMAIL_HOST|" $HOST_PROD/env.d/common
        sed -i "s|^DJANGO_EMAIL_PORT=.*|DJANGO_EMAIL_PORT=$DJANGO_EMAIL_PORT|" $HOST_PROD/env.d/common
        sed -i "s|^DJANGO_EMAIL_FROM=.*|DJANGO_EMAIL_FROM=$DJANGO_EMAIL_FROM|" $HOST_PROD/env.d/common
        sed -i "s|^DJANGO_EMAIL_BRAND_NAME=.*|DJANGO_EMAIL_BRAND_NAME=\"$DJANGO_EMAIL_BRAND_NAME\"|" $HOST_PROD/env.d/common
        echo "DJANGO_EMAIL_USE_SSL=$DJANGO_EMAIL_USE_SSL" >> $HOST_PROD/env.d/common
        echo "DJANGO_EMAIL_USE_TLS=$DJANGO_EMAIL_USE_TLS" >> $HOST_PROD/env.d/common
        echo "DJANGO_EMAIL_HOST_USER=$DJANGO_EMAIL_HOST_USER" >> $HOST_PROD/env.d/common
        echo "DJANGO_EMAIL_HOST_PASSWORD=$DJANGO_EMAIL_HOST_PASSWORD" >> $HOST_PROD/env.d/common
        echo "  Django SMTP configured from CI variables"
      fi
    # Injecter le DSN GlitchTip pour que Django active sentry-sdk.
    # Si la CI var GLITCHTIP_DSN_BACKEND est vide/absente, rien n'est ajoute —
    # sentry_sdk.init skip (cf src/backend/meet/settings.py:950-958).
    # Apres le 1er deploy tu crees le projet dans GlitchTip UI, recuperes son
    # DSN, le mets en CI var, et le deploy suivant active le capture.
    - |
      if [ -n "$GLITCHTIP_DSN_BACKEND" ]; then
        echo "DJANGO_SENTRY_DSN=$GLITCHTIP_DSN_BACKEND" >> $HOST_PROD/env.d/common
        echo "  GlitchTip DSN configured for Django backend"
      fi
    - mkdir -p $HOST_PROJECT/docker/auth
    - cp docker/auth/realm.json $HOST_PROJECT/docker/auth/realm.json
    - mkdir -p $HOST_PROJECT/docker/keycloak/themes/aiobi
    - cp -r docker/keycloak/themes/aiobi/. $HOST_PROJECT/docker/keycloak/themes/aiobi/

    # --- Se placer dans le production du host --------------------------------
    - cd $HOST_PROD

    # --- 1. Generer le .env depuis les variables CI/CD -----------------------
    - echo "=== Generating .env from CI/CD variables ==="
    - |
      cat > .env << ENVEOF
      MEET_HOST=${MEET_HOST}
      KEYCLOAK_HOST=${KEYCLOAK_HOST}
      LIVEKIT_HOST=${LIVEKIT_HOST}
      LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      POSTGRES_DB=${POSTGRES_DB}
      POSTGRES_USER=${POSTGRES_USER}
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      KC_POSTGRES_DB=${KC_POSTGRES_DB}
      KC_POSTGRES_USER=${KC_POSTGRES_USER}
      KC_POSTGRES_PASSWORD=${KC_POSTGRES_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME=${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_BOOTSTRAP_ADMIN_PASSWORD}
      OIDC_RP_CLIENT_ID=${OIDC_RP_CLIENT_ID}
      OIDC_RP_CLIENT_SECRET=${OIDC_RP_CLIENT_SECRET}
      LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      REALM_NAME=${REALM_NAME}
      DOCKER_USER=${DOCKER_USER:-1000}
      IMAGE_TAG=${CI_COMMIT_SHORT_SHA}
      CI_REGISTRY_IMAGE=${CI_REGISTRY_IMAGE}
      SUMMARY_API_TOKEN=${SUMMARY_API_TOKEN}
      RECORDING_STORAGE_EVENT_TOKEN=${RECORDING_STORAGE_EVENT_TOKEN}
      GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      GLITCHTIP_SECRET_KEY=${GLITCHTIP_SECRET_KEY}
      GLITCHTIP_POSTGRES_PASSWORD=${GLITCHTIP_POSTGRES_PASSWORD}
      ENVEOF
    - sed -i 's/^      //' .env
    - echo ".env generated with IMAGE_TAG=${CI_COMMIT_SHORT_SHA}"

    # --- 2. Keycloak (force-recreate si env.d/keycloak a change, sinon preserve sessions) ---
    - echo "=== Deploying Keycloak ==="
    - |
      DIFF_BASE="${CI_COMMIT_BEFORE_SHA:-HEAD~1}"
      if [ "$DIFF_BASE" = "0000000000000000000000000000000000000000" ]; then DIFF_BASE="HEAD~1"; fi
      if git diff --name-only "$DIFF_BASE" HEAD | grep -qE "docker/keycloak/themes/|docker/production/env.d/keycloak|docker/auth/realm.json"; then
        echo "  Keycloak theme/env/realm changed — force-recreating (sessions will be lost)"
        docker compose -f compose.keycloak.yaml up -d --force-recreate keycloak
      else
        echo "  Keycloak env unchanged — preserving sessions"
        docker compose -f compose.keycloak.yaml up -d
      fi

    # --- 3. Pull les nouvelles images depuis le registry ---------------------
    - echo "=== Pulling latest images from registry ==="
    - docker compose -f compose.yaml pull backend frontend

    # --- 4. App containers ----------------------------------------------------
    # Pas de --force-recreate: compose recreate uniquement les services dont
    # l'image (IMAGE_TAG=${CI_COMMIT_SHORT_SHA}) ou la config compose a change.
    # Les services statiques (postgres, redis, minio, livekit, whisper, ...)
    # restent en place -> pas de perte de sessions, pas de reload du modele
    # whisper en RAM, pas de coupure LiveKit pour les users en reunion.
    # NB: les fichiers bind-montes ne declenchent PAS automatiquement une recreation
    # du container (docker compose ne regarde que la definition du service). Le bloc
    # 4b ci-dessous detecte les changements et restart explicitement les services
    # concernes, pour eviter d'avoir a intervenir manuellement post-deploy.
    - echo "=== Deploying app containers ==="
    - docker compose -f compose.yaml up -d

    # --- 4b. Recharger les services aux fichiers bind-montes ------------------
    # Voir NB au-dessus : on detecte les changements de configs montees dans ce
    # commit et on restart le service concerne. Plus de risque d'oublier un
    # `docker compose restart` manuel apres un deploy qui change ces fichiers.
    - |
      DIFF_BASE="${CI_COMMIT_BEFORE_SHA:-HEAD~1}"
      if [ "$DIFF_BASE" = "0000000000000000000000000000000000000000" ]; then DIFF_BASE="HEAD~1"; fi
      CHANGED=$(git diff --name-only "$DIFF_BASE" HEAD || echo "")
      restart_if_changed() {
        local pattern=$1
        local service=$2
        if echo "$CHANGED" | grep -qE "$pattern"; then
          echo "  [deploy] $pattern changed — restarting $service"
          docker compose -f compose.yaml restart "$service" || true
        fi
      }
      restart_if_changed "docker/production/default.conf.template"       frontend
      restart_if_changed "docker/production/livekit-server.yaml"         livekit
      restart_if_changed "docker/production/livekit-egress.yaml"         livekit-egress
      restart_if_changed "docker/production/whisper-lb.conf"             whisper
      restart_if_changed "docker/production/monitoring/prometheus.yml"    prometheus
      restart_if_changed "docker/production/monitoring/grafana/"          grafana
      restart_if_changed "docker/production/monitoring/loki-config.yml"   loki
      restart_if_changed "docker/production/monitoring/promtail-config.yml" promtail

    # --- 5. Attendre le backend ----------------------------------------------
    - echo "=== Waiting for backend health check ==="
    - |
      for i in $(seq 1 30); do
        if docker compose -f compose.yaml exec -T backend python manage.py check 2>/dev/null; then
          echo "Backend is healthy!"
          break
        fi
        echo "Waiting... ($i/30)"
        sleep 5
      done

    # --- 6. Migrations automatiques ------------------------------------------
    - docker compose -f compose.yaml exec -T backend python manage.py migrate --noinput

    # --- 7. Configuration Keycloak post-deploy ---------------------------------
    # Le realm.json est un template d'import initial (secrets de dev).
    # Apres chaque deploy, on synchronise la config reelle via l'API REST.
    # Cela garantit que meme apres un destroy+recreate, Keycloak est configure.
    - echo "=== Configuring Keycloak (OIDC client, locale, redirect URIs) ==="
    - |
      # Keycloak parses smtpServer booleans in lowercase only ("true"/"false").
      # Django-style "True"/"False" would be treated as false and break SSL/STARTTLS.
      EMAIL_SSL_LC=$(echo "${DJANGO_EMAIL_USE_SSL:-false}" | tr '[:upper:]' '[:lower:]')
      EMAIL_TLS_LC=$(echo "${DJANGO_EMAIL_USE_TLS:-false}" | tr '[:upper:]' '[:lower:]')
      echo "Waiting for Keycloak to be ready..."
      for i in $(seq 1 30); do
        if docker compose -f compose.keycloak.yaml exec -T keycloak curl -sf http://localhost:8080/realms/meet > /dev/null 2>&1; then
          echo "Keycloak realm meet is ready!"
          break
        fi
        echo "Waiting for Keycloak... ($i/30)"
        sleep 5
      done

      echo "Getting admin token..."
      TOKEN=$(docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
        'curl -sf -X POST "http://localhost:8080/realms/master/protocol/openid-connect/token" \
        -d "client_id=admin-cli" \
        -d "username=$KEYCLOAK_ADMIN" \
        -d "password=$KEYCLOAK_ADMIN_PASSWORD" \
        -d "grant_type=password"' | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

      if [ -z "$TOKEN" ]; then
        echo "WARNING: Could not get Keycloak admin token. Skipping OIDC config."
      else
        echo "Got admin token. Configuring client..."

        # Get client internal ID
        CLIENT_UUID=$(docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
          "curl -sf 'http://localhost:8080/admin/realms/meet/clients' \
          -H 'Authorization: Bearer $TOKEN'" | grep -o '"id":"[^"]*","clientId":"meet"' | grep -o '"id":"[^"]*"' | cut -d'"' -f4)

        if [ -n "$CLIENT_UUID" ]; then
          # Update client secret + redirect URIs + post_logout_redirect_uris
          docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
            "curl -sf -X PUT 'http://localhost:8080/admin/realms/meet/clients/$CLIENT_UUID' \
            -H 'Authorization: Bearer $TOKEN' \
            -H 'Content-Type: application/json' \
            -d '{
              \"id\":\"$CLIENT_UUID\",
              \"clientId\":\"meet\",
              \"secret\":\"${OIDC_RP_CLIENT_SECRET}\",
              \"rootUrl\":\"https://${MEET_HOST}\",
              \"baseUrl\":\"https://${MEET_HOST}/\",
              \"redirectUris\":[\"https://${MEET_HOST}/*\",\"http://localhost:3000/*\",\"http://localhost:8070/*\"],
              \"webOrigins\":[\"https://${MEET_HOST}\",\"http://localhost:3000\",\"http://localhost:8070\"],
              \"attributes\":{\"post.logout.redirect.uris\":\"https://${MEET_HOST}/*\"}
            }'" && echo "  Client secret + URIs updated"

          # Set realm config: locale FR + aiobi themes + SMTP + verifyEmail
          docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
            "curl -sf -X PUT 'http://localhost:8080/admin/realms/meet' \
            -H 'Authorization: Bearer $TOKEN' \
            -H 'Content-Type: application/json' \
            -d '{
              \"defaultLocale\":\"fr\",
              \"internationalizationEnabled\":true,
              \"supportedLocales\":[\"fr\"],
              \"loginTheme\":\"aiobi\",
              \"emailTheme\":\"aiobi\",
              \"verifyEmail\":true,
              \"smtpServer\":{
                \"host\":\"${DJANGO_EMAIL_HOST}\",
                \"port\":\"${DJANGO_EMAIL_PORT}\",
                \"ssl\":\"${EMAIL_SSL_LC}\",
                \"starttls\":\"${EMAIL_TLS_LC}\",
                \"auth\":\"true\",
                \"user\":\"${DJANGO_EMAIL_HOST_USER}\",
                \"password\":\"${DJANGO_EMAIL_HOST_PASSWORD}\",
                \"from\":\"${DJANGO_EMAIL_FROM}\",
                \"fromDisplayName\":\"${DJANGO_EMAIL_BRAND_NAME}\",
                \"replyTo\":\"support@aiobi.world\"
              }
            }'" \
            && echo "  Realm: locale FR + aiobi themes + SMTP + verifyEmail applied"
        else
          echo "WARNING: Could not find client 'meet'. First deploy? Realm may need import."
        fi
      fi

    # --- 8. Cleanup + Promote enterprise users from file -----------------------
    - echo "=== Cleaning up and promoting enterprise users ==="
    - |
      if [ -f "$CI_PROJECT_DIR/docker/production/enterprise-users.txt" ]; then
        DOMAINS=$(grep -v '^\s*#' "$CI_PROJECT_DIR/docker/production/enterprise-users.txt" | grep -v '^\s*$' | grep '^@' | sed 's/^@//' | tr '\n' ',' | sed 's/,$//')
        EMAILS=$(grep -v '^\s*#' "$CI_PROJECT_DIR/docker/production/enterprise-users.txt" | grep -v '^\s*$' | grep -v '^@' | grep '@' | tr '\n' ',' | sed 's/,$//')
        # Reset non-matching users to normal + remove superuser
        docker compose -f compose.yaml exec -T backend python manage.py shell -c "
      from core.models import User
      domains = [d.strip() for d in '$DOMAINS'.split(',') if d.strip()]
      emails = [e.strip() for e in '$EMAILS'.split(',') if e.strip()]
      for u in User.objects.all():
          is_enterprise = any(u.email.endswith('@' + d) for d in domains) or u.email in emails
          if not is_enterprise:
              changed = u.account_tier == 'enterprise' or u.is_superuser or u.is_staff
              if changed:
                  User.objects.filter(pk=u.pk).update(account_tier='normal', is_superuser=False, is_staff=False)
                  print(f'{u.email} -> reset to normal')
      " 2>&1
        # Promote matching users in Django DB
        docker compose -f compose.yaml exec -T backend python manage.py shell -c "
      from core.models import User
      domains = [d.strip() for d in '$DOMAINS'.split(',') if d.strip()]
      emails = [e.strip() for e in '$EMAILS'.split(',') if e.strip()]
      for u in User.objects.all():
          is_enterprise = any(u.email.endswith('@' + d) for d in domains) or u.email in emails
          if is_enterprise:
              if u.account_tier != 'enterprise':
                  User.objects.filter(pk=u.pk).update(account_tier='enterprise')
                  print(f'{u.email} -> promoted to enterprise')
              else:
                  print(f'{u.email} -> already enterprise')
      " 2>&1
        # Assign enterprise role in Keycloak for matching users
        echo "  Assigning enterprise role in Keycloak..."
        KC_TOKEN=$(docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
          'curl -sf -X POST "http://localhost:8080/realms/master/protocol/openid-connect/token" \
          -d "client_id=admin-cli" \
          -d "username=$KEYCLOAK_ADMIN" \
          -d "password=$KEYCLOAK_ADMIN_PASSWORD" \
          -d "grant_type=password"' | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

        if [ -n "$KC_TOKEN" ]; then
          # Ensure enterprise role exists
          docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
            "curl -sf -o /dev/null -w '%{http_code}' 'http://localhost:8080/admin/realms/meet/roles/enterprise' \
            -H 'Authorization: Bearer $KC_TOKEN'" | grep -q 200 || \
          docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
            "curl -sf -X POST 'http://localhost:8080/admin/realms/meet/roles' \
            -H 'Authorization: Bearer $KC_TOKEN' \
            -H 'Content-Type: application/json' \
            -d '{\"name\":\"enterprise\",\"description\":\"Enterprise tier\"}'" && echo "    Created enterprise role"

          ROLE_JSON=$(docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
            "curl -sf 'http://localhost:8080/admin/realms/meet/roles/enterprise' \
            -H 'Authorization: Bearer $KC_TOKEN'")

          # Assign role to matching domain users
          for DOMAIN in $(echo "$DOMAINS" | tr ',' ' '); do
            USERS_JSON=$(docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
              "curl -sf 'http://localhost:8080/admin/realms/meet/users?max=500' \
              -H 'Authorization: Bearer $KC_TOKEN'")
            for USER_ID in $(echo "$USERS_JSON" | grep -o '"id":"[^"]*","createdTimestamp":[^,]*,"username":"[^"]*","enabled":[^,]*,"totp":[^,]*,"emailVerified":[^,]*,"firstName":"[^"]*","lastName":"[^"]*","email":"[^"]*@'"$DOMAIN"'"' | grep -o '"id":"[^"]*"' | cut -d'"' -f4); do
              docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
                "curl -sf -X POST 'http://localhost:8080/admin/realms/meet/users/$USER_ID/role-mappings/realm' \
                -H 'Authorization: Bearer $KC_TOKEN' \
                -H 'Content-Type: application/json' \
                -d '[$ROLE_JSON]'" 2>/dev/null
            done
            echo "    @$DOMAIN -> enterprise role assigned"
          done

          # Assign role to individual email users
          for EMAIL in $(echo "$EMAILS" | tr ',' ' '); do
            USER_ID=$(docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
              "curl -sf 'http://localhost:8080/admin/realms/meet/users?email=$EMAIL&exact=true' \
              -H 'Authorization: Bearer $KC_TOKEN'" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
            if [ -n "$USER_ID" ]; then
              docker compose -f compose.keycloak.yaml exec -T keycloak bash -c \
                "curl -sf -X POST 'http://localhost:8080/admin/realms/meet/users/$USER_ID/role-mappings/realm' \
                -H 'Authorization: Bearer $KC_TOKEN' \
                -H 'Content-Type: application/json' \
                -d '[$ROLE_JSON]'" 2>/dev/null
              echo "    $EMAIL -> enterprise role assigned"
            fi
          done
        else
          echo "  WARNING: Could not get Keycloak admin token for role assignment"
        fi
      else
        echo "  No enterprise-users.txt found, skipping"
      fi

    # --- 9. Verification rapide Traefik (TLS est automatique) ----------------
    - echo "=== Verifying Traefik routing ==="
    - |
      sleep 10
      for domain in meet.aiobi.world id.aiobi.world lkt.aiobi.world; do
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://${domain}" 2>/dev/null || echo "000")
        echo "  ${domain}: HTTP ${HTTP_CODE}"
      done

    - echo "=== Production deploy complete ==="

  environment:
    name: production
    url: https://meet.aiobi.world
  only:
    - main
  needs:
    - build-backend-prod
    - build-frontend-prod
    - build-summary-prod

# =============================================================================
# DIAGNOSTIC (temporaire — a supprimer apres le premier deploy reussi)
# =============================================================================

debug-production:
  stage: deploy
  tags:
    - aiobi-prod
    - docker
  image: docker:27
  before_script:
    - apk add --no-cache docker-cli-compose curl
  script:
    - cd $PRODUCTION_DIR

    - echo "=== Docker containers ==="
    - docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | head -30

    - echo "=== aiobi-public network ==="
    - docker network inspect aiobi-public --format '{{range .Containers}}{{.Name}} {{end}}' 2>&1 || echo "Network not found"

    - echo "=== prod-app network ==="
    - docker network inspect prod-app --format '{{range .Containers}}{{.Name}} {{end}}' 2>&1 || echo "Network not found"

    - echo "=== Traefik config ==="
    - docker inspect traefik --format '{{json .Args}}' 2>&1 || echo "No traefik container"

    - echo "=== Traefik env ==="
    - docker inspect traefik --format '{{json .Config.Env}}' 2>&1 | tr ',' '\n' || echo "No traefik env"

    - echo "=== Traefik volumes ==="
    - docker inspect traefik --format '{{json .HostConfig.Binds}}' 2>&1 || echo "No traefik binds"

    - echo "=== Traefik networks ==="
    - docker inspect traefik --format '{{json .NetworkSettings.Networks}}' 2>&1 | tr ',' '\n' || echo "No traefik networks"

    - echo "=== Traefik compose (if exists) ==="
    - docker inspect traefik --format '{{index .Config.Labels "com.docker.compose.project.config_files"}}' 2>&1 || echo "Not from compose"
    - cat /opt/aiobi-meet/traefik/docker-compose.yml 2>/dev/null || cat /opt/traefik/docker-compose.yml 2>/dev/null || echo "No traefik compose found in common paths"

    - echo "=== Traefik static config ==="
    - docker exec traefik cat /etc/traefik/traefik.yml 2>/dev/null || docker exec traefik cat /etc/traefik/traefik.toml 2>/dev/null || echo "No static config found"

    - echo "=== Traefik logs (last 50) ==="
    - docker logs --tail 50 traefik 2>&1 || echo "No traefik logs"

    - echo "=== Traefik routers ==="
    - curl -s http://localhost:8080/api/http/routers 2>/dev/null | head -200 || echo "Traefik API not reachable on 8080"
    - curl -s http://localhost:8888/api/http/routers 2>/dev/null | head -200 || echo "Traefik API not reachable on 8888"

    - echo "=== Traefik listening ports ==="
    - ss -tlnp 2>/dev/null | grep -E "80|443|8080|8888" || echo "Cannot check ports"

    - echo "=== Frontend labels ==="
    - docker inspect production-frontend-1 --format '{{json .Config.Labels}}' 2>&1 | tr ',' '\n' || echo "No frontend"

    - echo "=== Keycloak labels ==="
    - docker inspect production-keycloak-1 --format '{{json .Config.Labels}}' 2>&1 | tr ',' '\n' || echo "No keycloak"

    - echo "=== Livekit labels ==="
    - docker inspect production-livekit-1 --format '{{json .Config.Labels}}' 2>&1 | tr ',' '\n' || echo "No livekit"

    - echo "=== Frontend logs ==="
    - docker logs --tail 20 $(docker ps -qf "name=frontend" | head -1) 2>&1 || echo "No frontend container"

    - echo "=== Backend logs ==="
    - docker logs --tail 50 $(docker ps -qf "name=backend" | head -1) 2>&1 || echo "No backend container"

    - echo "=== Enterprise users in Django DB ==="
    - |
      docker compose exec -T backend python manage.py shell -c "
      from core.models import User
      for u in User.objects.all():
          print(f'{u.email} -> account_tier={u.account_tier} is_superuser={u.is_superuser}')
      " 2>&1 || echo "Could not query users"

    - echo "=== Backend SMTP config ==="
    - docker compose exec -T backend env 2>/dev/null | grep -i "EMAIL" || echo "Could not read backend env"

    - echo "=== Network + DNS test from backend ==="
    - |
      docker compose exec -T backend python3 -c "
      import socket, time, ssl
      print('--- DNS resolution ---')
      try:
          t = time.time()
          r = socket.getaddrinfo('smtp.gmail.com', 465)
          print(f'DNS resolved in {time.time()-t:.2f}s: {r[0][4]}')
      except Exception as e:
          print(f'DNS FAILED: {e}')
      print('--- TCP connect to smtp.gmail.com:465 ---')
      try:
          t = time.time()
          ctx = ssl.create_default_context()
          s = ctx.wrap_socket(socket.socket(), server_hostname='smtp.gmail.com')
          s.settimeout(5)
          s.connect(('smtp.gmail.com', 465))
          print(f'Connected in {time.time()-t:.2f}s')
          s.close()
      except Exception as e:
          print(f'TCP CONNECT FAILED: {e}')
      " 2>&1 || echo "Could not run network test"

    - echo "=== Network + DNS test from Keycloak ==="
    - |
      docker compose -f compose.keycloak.yaml exec -T keycloak bash -c "
        curl -sf -o /dev/null -w 'Keycloak -> smtp.gmail.com:465 connect time: %{time_connect}s\n' --max-time 10 https://smtp.gmail.com:465 2>&1 || echo 'Keycloak network test done'
      " 2>&1 || echo "Could not run keycloak network test"

    - echo "=== Test email send ==="
    - |
      docker compose exec -T backend python manage.py shell -c "
      from django.core.mail import send_mail
      try:
          send_mail('Debug test', 'Test from debug-production', None, ['yanisaxel.dabo@aiobi.world'])
          print('EMAIL SEND: OK')
      except Exception as e:
          print(f'EMAIL SEND FAILED: {e}')
      " 2>&1 || echo "Could not test email"

    - echo "=== Backend errors (last 100 lines) ==="
    - docker compose logs backend --tail 100 2>&1 | grep -i "error\|exception\|traceback\|failed\|500\|502\|503\|504" | tail -30 || echo "No errors found"

    - echo "=== LiveKit Egress logs ==="
    - docker compose logs livekit-egress --tail 30 2>&1 || echo "No egress container"

    - echo "=== Summary service logs ==="
    - docker compose logs summary --tail 30 2>&1 || echo "No summary container"

    - echo "=== Celery transcribe logs ==="
    - docker compose logs celery-transcribe --tail 30 2>&1 || echo "No celery-transcribe container"

    - echo "=== Whisper logs ==="
    - docker compose logs whisper --tail 20 2>&1 || echo "No whisper container"

    - echo "=== MinIO health ==="
    - docker compose exec -T minio mc ready local 2>&1 || echo "MinIO not ready"

    - echo "=== .env check ==="
    - grep -E "MEET_HOST|KEYCLOAK_HOST|LIVEKIT_HOST|IMAGE_TAG|EMAIL_HOST|SUMMARY" .env 2>/dev/null || echo "No .env found"

    - echo "=== env.d/common SMTP section ==="
    - grep -i "EMAIL" env.d/common 2>/dev/null || echo "No env.d/common"

    - echo "=== Restarting Traefik ==="
    - docker restart traefik
    - sleep 10

    - echo "=== Traefik file logs ==="
    - docker exec traefik cat /logs/traefik.log 2>/dev/null | tail -50 || echo "No traefik.log"

    - echo "=== Traefik access logs ==="
    - docker exec traefik cat /logs/access.log 2>/dev/null | tail -20 || echo "No access.log"

    - echo "=== Traefik dynamic config ==="
    - docker exec traefik ls /config/dynamic/ 2>/dev/null || echo "No dynamic dir"
    - docker exec traefik cat /config/dynamic/*.yml 2>/dev/null || docker exec traefik cat /config/dynamic/*.yaml 2>/dev/null || echo "No dynamic files"

    - echo "=== Connectivity test (Traefik -> frontend on aiobi-public) ==="
    - docker exec traefik wget -q -O- --timeout=5 http://production-frontend-1:8083/ 2>&1 | head -5 || echo "Cannot reach frontend from traefik"

    - echo "=== Curl tests after Traefik restart ==="
    - curl -sk -o /dev/null -w "meet.aiobi.world -> %{http_code}\n" https://meet.aiobi.world --max-time 10 2>&1 || echo "Failed"
    - curl -sk -o /dev/null -w "id.aiobi.world -> %{http_code}\n" https://id.aiobi.world --max-time 10 2>&1 || echo "Failed"
    - curl -sk -o /dev/null -w "lkt.aiobi.world -> %{http_code}\n" https://lkt.aiobi.world --max-time 10 2>&1 || echo "Failed"
  when: manual
  only:
    - main
  needs:
    - deploy-production

      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&amp;display=swap');
      
      text {
        font-family: 'Space Mono', monospace;
        font-size: 16px;
        fill: #a251fc;
        white-space: pre;
      }
      
      .line {
        opacity: 0;
        transform-origin: center;
        animation: formFullShield 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      
      @keyframes formFullShield {
        0% { opacity: 0; transform: translateY(-40px) scale(0.9); filter: blur(8px); letter-spacing: -5px; }
        100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); letter-spacing: 0px; text-shadow: 0 0 10px #a251fc; }
      }
      
      /* Délais ultra-rapides pour l'effet d'assemblage fluide */
      .l1 {animation-delay: 0.05s;} .l2 {animation-delay: 0.08s;} .l3 {animation-delay: 0.11s;}
      .l4 {animation-delay: 0.14s;} .l5 {animation-delay: 0.17s;} .l6 {animation-delay: 0.20s;}

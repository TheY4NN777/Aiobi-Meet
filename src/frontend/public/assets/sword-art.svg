      .l34 {animation-delay: 1.04s;} .l35 {animation-delay: 1.07s;} .l36 {animation-delay: 1.10s;}
      .l37 {animation-delay: 1.13s;} .l38 {animation-delay: 1.16s;} .l39 {animation-delay: 1.19s;}

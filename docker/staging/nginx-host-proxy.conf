# =============================================================================
# Aïobi Meet Staging — Configuration Nginx hote
# =============================================================================
#
# Ce fichier configure le nginx natif du serveur pour :
# 1. Proxier les challenges ACME (Let's Encrypt) vers nginx-proxy Docker
# 2. Rediriger le trafic HTTP vers HTTPS sur le port 8443
#
# Les clients accedent au staging via :
#   https://aiobi-meet.duckdns.org:8443
#   https://aiobi-livekit.duckdns.org:8443
#
# Pourquoi le port 8443 et pas 443 ?
#   Le serveur heberge d'autres applications (ERPNext, Eshu, etc.) qui
#   utilisent deja les ports 80 et 443 via le nginx natif. Pour eviter
#   tout conflit, nginx-proxy Docker ecoute sur 8443 (HTTPS) et 8880
#   (HTTP). Le nginx natif se contente de proxier les challenges ACME
#   sur le port 80 pour que Let's Encrypt puisse valider les domaines.
#
# Installation :
#   sudo cp nginx-host-proxy.conf /etc/nginx/sites-enabled/aiobi-meet-staging
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Suppression (quand les autres apps seront migrees) :
#   sudo rm /etc/nginx/sites-enabled/aiobi-meet-staging
#   sudo systemctl reload nginx
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name aiobi-meet.duckdns.org aiobi-livekit.duckdns.org;

    # Let's Encrypt ACME challenge
    # nginx-proxy Docker ecoute sur 8880 et sert les reponses ACME.
    # Sans ce proxy, Let's Encrypt ne peut pas valider les domaines
    # car il envoie ses requetes sur le port 80 uniquement.
    location /.well-known/acme-challenge/ {
        proxy_pass http://127.0.0.1:8880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tout le reste redirige vers HTTPS sur le port 8443
    location / {
        return 301 https://$host:8443$request_uri;
    }
}

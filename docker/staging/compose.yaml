services:
  # ---------------------------------------------------------------------------
  # Base de donnees
  # ---------------------------------------------------------------------------
  postgresql:
    image: postgres:16
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 1s
      timeout: 2s
      retries: 300
    env_file:
      - .env
      - env.d/postgresql
    volumes:
      - ./data/databases/backend:/var/lib/postgresql/data
    networks:
      - default

  redis:
    image: redis:5
    restart: always
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Stockage S3 (MinIO)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${POSTGRES_USER}
      MINIO_ROOT_PASSWORD: ${POSTGRES_PASSWORD}
      # Webhook vers le backend quand un fichier est uploade dans recordings/
      MINIO_NOTIFY_WEBHOOK_ENABLE_meet: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_meet: http://backend:8000/api/v1.0/recordings/storage-hook/
      MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_meet: ${RECORDING_STORAGE_EVENT_TOKEN}
    volumes:
      - ./data/media:/data
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 20s
      retries: 300
    networks:
      - default

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
      backend:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set meet http://minio:9000 $${POSTGRES_USER} $${POSTGRES_PASSWORD} &&
      mc mb meet/meet-media-storage --ignore-existing &&
      mc event add meet/meet-media-storage arn:minio:sqs::meet:webhook --event put --prefix recordings/ --ignore-existing 2>/dev/null;
      echo 'Buckets and events configured';
      "
    env_file:
      - .env
      - env.d/postgresql
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Backend Django (Gunicorn)
  # ---------------------------------------------------------------------------
  backend:
    image: aiobi-meet/backend:latest
    user: ${DOCKER_USER:-1000}
    restart: always
    env_file:
      - .env
      - env.d/common
      - env.d/postgresql
      - env.d/hosts
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 15s
      timeout: 30s
      retries: 20
      start_period: 10s
    depends_on:
      postgresql:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started
      livekit:
        condition: service_started
    networks:
      - default
      - staging-app

  # ---------------------------------------------------------------------------
  # Celery worker
  # ---------------------------------------------------------------------------
  celery:
    image: aiobi-meet/backend:latest
    user: ${DOCKER_USER:-1000}
    restart: always
    command: celery -A meet.celery_app worker -l INFO
    env_file:
      - .env
      - env.d/common
      - env.d/postgresql
      - env.d/hosts
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Frontend (Nginx — point d'entree principal)
  # Route: / -> SPA, /api -> backend, /realms -> keycloak
  # ---------------------------------------------------------------------------
  frontend:
    image: aiobi-meet/frontend:latest
    user: ${DOCKER_USER:-1000}
    restart: always
    entrypoint:
      - /docker-entrypoint.sh
    command: ["nginx", "-g", "daemon off;"]
    env_file:
      - .env
      - env.d/common
      - env.d/hosts
    environment:
      - VIRTUAL_HOST=${MEET_HOST}
      - VIRTUAL_PORT=8083
      - LETSENCRYPT_HOST=${MEET_HOST}
      - LETSENCRYPT_TEST=${LETSENCRYPT_TEST}
    volumes:
      - ./default.conf.template:/etc/nginx/templates/default.conf.template
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - proxy-tier
      - default
      - staging-app

  # ---------------------------------------------------------------------------
  # Mailcatcher (staging — pas de vrai SMTP)
  # ---------------------------------------------------------------------------
  mailcatcher:
    image: sj26/mailcatcher:latest
    restart: always
    networks:
      - default

  # ---------------------------------------------------------------------------
  # LiveKit (SFU WebRTC)
  # ---------------------------------------------------------------------------
  livekit:
    image: livekit/livekit-server:latest
    restart: always
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed "s|__LIVEKIT_API_SECRET__|$LIVEKIT_API_SECRET|g" /config.template.yaml > /config.yaml
        exec /livekit-server --config /config.yaml
    ports:
      - "47881:47881/tcp"
      - "47882:47882/udp"
    volumes:
      - ./livekit-server.yaml:/config.template.yaml:ro
    environment:
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - VIRTUAL_HOST=${LIVEKIT_HOST}
      - VIRTUAL_PORT=47880
      - LETSENCRYPT_HOST=${LIVEKIT_HOST}
      - LETSENCRYPT_TEST=${LETSENCRYPT_TEST}
    depends_on:
      redis:
        condition: service_started
    networks:
      - proxy-tier
      - default

  # ---------------------------------------------------------------------------
  # LiveKit Egress (enregistrement des rooms → upload MinIO)
  # ---------------------------------------------------------------------------
  livekit-egress:
    image: livekit/egress:v1.11.0
    restart: always
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed -e "s|__LIVEKIT_API_SECRET__|$$LIVEKIT_API_SECRET|g" \
            -e "s|__MINIO_ACCESS_KEY__|$$POSTGRES_USER|g" \
            -e "s|__MINIO_SECRET_KEY__|$$POSTGRES_PASSWORD|g" \
            /egress-config.template.yaml > /egress-config.yaml
        exec /egress
    env_file:
      - .env
    environment:
      EGRESS_CONFIG_FILE: /egress-config.yaml
    volumes:
      - ./livekit-egress.yaml:/egress-config.template.yaml:ro
    depends_on:
      - redis
      - minio
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Whisper local (transcription audio — faster-whisper-server)
  # API compatible OpenAI : POST /v1/audio/transcriptions
  # Premier demarrage : telecharge le modele large-v3 (~3 GB)
  # ---------------------------------------------------------------------------
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: always
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-large-v3
      - WHISPER__DEVICE=cpu
      - WHISPER__COMPUTE_TYPE=int8
    volumes:
      - whisper-models:/root/.cache/huggingface
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Redis pour le summary service (broker Celery + result backend)
  # ---------------------------------------------------------------------------
  redis-summary:
    image: redis:5
    restart: always
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Summary service (FastAPI — transcription + resume IA)
  # ---------------------------------------------------------------------------
  summary:
    image: aiobi-meet/summary:latest
    user: ${DOCKER_USER:-1000}
    restart: always
    env_file:
      - .env
      - env.d/summary
    depends_on:
      - redis-summary
      - whisper
      - minio
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Celery worker — transcription (queue: transcribe-queue)
  # ---------------------------------------------------------------------------
  celery-transcribe:
    image: aiobi-meet/summary:latest
    user: ${DOCKER_USER:-1000}
    restart: always
    command: celery -A summary.core.celery_worker worker --pool=solo -l INFO -Q transcribe-queue --concurrency=2
    env_file:
      - .env
      - env.d/summary
    depends_on:
      - redis-summary
      - whisper
      - minio
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Celery worker — resume IA (queue: summarize-queue)
  # Pret pour Phase 2 (Docker Model Runner)
  # ---------------------------------------------------------------------------
  celery-summarize:
    image: aiobi-meet/summary:latest
    user: ${DOCKER_USER:-1000}
    restart: always
    command: celery -A summary.core.celery_worker worker --pool=solo -l INFO -Q summarize-queue --concurrency=2
    env_file:
      - .env
      - env.d/summary
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis-summary
    networks:
      - default

volumes:
  whisper-models:

networks:
  proxy-tier:
    external: true
  staging-app:
    name: staging-app
  default:

events {
    worker_connections 1024;
}

http {
    # Round-robin across multiple whisper instances. The summary service still
    # talks to "whisper:8000" — it does not know there are several backends.
    upstream whisper_backend {
        server whisper-1:8000;
        server whisper-2:8000;
        server whisper-3:8000;
        server whisper-4:8000;
        keepalive 64;
    }

    # Audio uploads can be large; default nginx limit (1M) would reject them.
    client_max_body_size 500M;

    # Timeout hierarchy (must stay aligned to avoid premature 504s):
    #   - Celery task time_limit:    5h  (hard kill, ultimate ceiling)
    #   - OpenAI client timeout:     6h  (client wait — settings.whisperx_timeout)
    #   - nginx proxy_read_timeout:  6h+ (must be >= client to avoid cutting it off)
    # If proxy_read_timeout < client timeout, nginx returns 504 first and the
    # OpenAI client raises HTTPError — discarding whisper work in progress.
    proxy_read_timeout 21600s;
    proxy_send_timeout 21600s;
    proxy_connect_timeout 60s;

    server {
        listen 8000;
        server_name whisper;

        location / {
            proxy_pass http://whisper_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            # Stream the request body straight through (no buffering of large
            # audio uploads) and stream the response back as it arrives.
            proxy_request_buffering off;
            proxy_buffering off;
        }
    }
}

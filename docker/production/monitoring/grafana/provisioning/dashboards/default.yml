# Grafana dashboard provider — charge les .json du dossier dashboards
#
# Tous les fichiers JSON dans /var/lib/grafana/dashboards (monte depuis
# docker/production/monitoring/grafana/dashboards/) seront charges au
# demarrage et recharges automatiquement toutes les 10 secondes (updateIntervalSeconds).
#
# Tous les dashboards sont places dans le folder "Aïobi Meet" (folderUid=aiobi).
# On garde l'UID ASCII stable "aiobi" pour ne pas casser les URLs existantes —
# seul le display name change.
# Pas d'arborescence dynamique car on a une structure plate dans dashboards/
# (si un jour on veut des sous-folders, il faudra retirer folder+folderUid et
# remettre foldersFromFilesStructure: true — mais les deux sont incompatibles).

apiVersion: 1

providers:
  - name: aiobi-dashboards
    orgId: 1
    folder: "Aïobi Meet"
    folderUid: aiobi
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 10
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards

log_level: info
api_key: meet
api_secret: __LIVEKIT_API_SECRET__
ws_url: "ws://livekit:47880"
insecure: true
# 7980 est utilise en interne par egress pour son serveur template HTTP
# (cf `template_base: http://localhost:7980/` passe au handler Chrome).
# Conflit observe le 2026-04-16 : Chrome recevait le body Prometheus au lieu
# du HTML composite, recording silencieusement casse. Deplacement sur 7981.
prometheus_port: 7981
redis:
  address: redis:6379

s3:
  access_key: __MINIO_ACCESS_KEY__
  secret: __MINIO_SECRET_KEY__
  region: us-east-1
  endpoint: http://minio:9000
  bucket: meet-media-storage
  force_path_style: true

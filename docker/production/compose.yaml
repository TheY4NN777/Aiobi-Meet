services:
  # ---------------------------------------------------------------------------
  # Base de donnees
  # ---------------------------------------------------------------------------
  postgresql:
    image: postgres:16
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 1s
      timeout: 2s
      retries: 300
    env_file:
      - .env
      - env.d/postgresql
    command: >
      postgres
      -c shared_buffers=4GB
      -c effective_cache_size=12GB
      -c work_mem=64MB
      -c maintenance_work_mem=512MB
    volumes:
      - ./data/databases/backend:/var/lib/postgresql/data
    # Memory cap computed from: shared_buffers=4GB + work_mem=64MB × ~50
    # connections peak (~3.2 GB) + maintenance_work_mem=512MB + connection
    # overhead (~50 MB × 50 = 2.5 GB) + OS page cache slack = ~12 GB total.
    # An 8 GB cap (earlier proposal) would have risked OOM under query bursts.
    # Reservation 4 GB guarantees shared_buffers are always resident.
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 12G
        reservations:
          cpus: '0.5'
          memory: 4G
    networks:
      - default

  redis:
    image: redis:5
    restart: always
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy volatile-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    # 2G memory limit matches --maxmemory 2gb; CPU cap is generous since Redis
    # is I/O-bound and single-threaded for command execution.
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Stockage S3 (MinIO)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${POSTGRES_USER}
      MINIO_ROOT_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_NOTIFY_WEBHOOK_ENABLE_meet: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_meet: http://backend:8000/api/v1.0/recordings/storage-hook/
      MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_meet: ${RECORDING_STORAGE_EVENT_TOKEN}
    volumes:
      - ./data/media:/data
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 20s
      retries: 300
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - default

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set meet http://minio:9000 $${POSTGRES_USER} $${POSTGRES_PASSWORD} &&
      mc mb meet/meet-media-storage --ignore-existing &&
      mc event add meet/meet-media-storage arn:minio:sqs::meet:webhook --event put --prefix recordings/ --ignore-existing 2>/dev/null;
      echo 'Buckets and events configured';
      "
    env_file:
      - .env
      - env.d/postgresql
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Backend Django (Gunicorn — 6 workers)
  # ---------------------------------------------------------------------------
  backend:
    image: ${CI_REGISTRY_IMAGE:-aiobi-meet}/backend:${IMAGE_TAG:-latest}
    user: ${DOCKER_USER:-1000}
    restart: always
    env_file:
      - .env
      - env.d/common
      - env.d/postgresql
      - env.d/hosts
    environment:
      # Gunicorn worker count is set authoritatively in
      # docker/files/usr/local/etc/gunicorn/meet.py (workers = 6). We used to
      # override here via GUNICORN_CMD_ARGS=--workers=6 which shadowed the
      # file and created two sources of truth. Removed 2026-04-18 to keep the
      # config declarative in a single place.
      #
      # django-prometheus en mode multi-process (6 workers Gunicorn) necessite
      # un dossier partage pour consolider les metriques des workers. Sinon
      # chaque worker exporterait ses propres counters et /metrics renverrait
      # les stats d'un seul worker (round-robin) au lieu de la somme.
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
    # tmpfs monte un filesystem en RAM au chemin indique — cree automatiquement
    # le dossier et le rend writable par le user du container. Necessaire car
    # prometheus_client ouvre plusieurs .db files dedans au demarrage de chaque
    # worker Gunicorn. Ephemere par design : les stats repartent de 0 au restart
    # du container (aligne avec la semantique des counters Prometheus).
    tmpfs:
      - /tmp/prometheus_multiproc
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 15s
      timeout: 30s
      retries: 20
      start_period: 10s
    depends_on:
      postgresql:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started
      livekit:
        condition: service_started
    # Gunicorn 6 workers @ ~200 MB RAM each (Django + DB + OIDC + LiveKit SDK)
    # gives a ~1.2 GB working set. Cap 2 GB RAM leaves a 70% margin for the
    # prometheus multiproc tmpfs and transient request handling. CPU cap 4
    # lets 4 workers saturate simultaneously on a burst without starving the
    # rest of the system. Reservation 1 CPU / 512 MB ensures Django stays
    # responsive even while whisper/LiveKit contend for CPU.
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 512M
    networks:
      - default
      - prod-app

  # ---------------------------------------------------------------------------
  # Celery worker (concurrency 4)
  # ---------------------------------------------------------------------------
  celery:
    image: ${CI_REGISTRY_IMAGE:-aiobi-meet}/backend:${IMAGE_TAG:-latest}
    user: ${DOCKER_USER:-1000}
    restart: always
    command: celery -A meet.celery_app worker -l INFO --concurrency=4
    env_file:
      - .env
      - env.d/common
      - env.d/postgresql
      - env.d/hosts
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Frontend (Nginx — routing principal)
  # Route: / -> SPA, /api -> backend, /admin -> backend, /media -> MinIO
  # Keycloak n'est PAS route ici (sous-domaine dedie id.aiobi.world)
  # ---------------------------------------------------------------------------
  frontend:
    image: ${CI_REGISTRY_IMAGE:-aiobi-meet}/frontend:${IMAGE_TAG:-latest}
    user: ${DOCKER_USER:-1000}
    restart: always
    entrypoint:
      - /docker-entrypoint.sh
    command: ["nginx", "-g", "daemon off;"]
    env_file:
      - .env
      - env.d/common
      - env.d/hosts
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meet.rule=Host(`${MEET_HOST}`)"
      - "traefik.http.routers.meet.entrypoints=websecure"
      - "traefik.http.routers.meet.tls.certresolver=letsencrypt"
      - "traefik.http.services.meet.loadbalancer.server.port=8083"
    volumes:
      - ./default.conf.template:/etc/nginx/templates/default.conf.template
    depends_on:
      backend:
        condition: service_healthy
    # Nginx frontend is public-facing (via Traefik). Cap matters more for DoS
    # defense than capacity: nginx event-driven model handles thousands of
    # conns on <1 CPU + 256M. 1 CPU / 512M gives ample headroom and prevents
    # a log explosion or TLS handshake flood from starving other services.
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - aiobi-public
      - default
      - prod-app

  # ---------------------------------------------------------------------------
  # Mailcatcher (temporaire — remplacer par SMTP reel plus tard)
  # ---------------------------------------------------------------------------
  mailcatcher:
    image: sj26/mailcatcher:latest
    restart: always
    networks:
      - default

  # ---------------------------------------------------------------------------
  # LiveKit (SFU WebRTC)
  # ---------------------------------------------------------------------------
  livekit:
    image: livekit/livekit-server:latest
    restart: always
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed "s|__LIVEKIT_API_SECRET__|$LIVEKIT_API_SECRET|g" /config.template.yaml > /config.yaml
        exec /livekit-server --config /config.yaml
    ports:
      - "47881:47881/tcp"
      - "47882:47882/udp"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.livekit.rule=Host(`${LIVEKIT_HOST}`)"
      - "traefik.http.routers.livekit.entrypoints=websecure"
      - "traefik.http.routers.livekit.tls.certresolver=letsencrypt"
      - "traefik.http.services.livekit.loadbalancer.server.port=47880"
    volumes:
      - ./livekit-server.yaml:/config.template.yaml:ro
    environment:
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    depends_on:
      redis:
        condition: service_started
    # LiveKit SFU sizing — benchmark-informed (upstream "Going beyond a single
    # core" blog + Benchmarking doc): ~100 down-tracks per CPU core. For a
    # realistic mix (a few 10-participant rooms plus an occasional 100-person
    # call with 3-5 active publishers), an 8 CPU cap supports ~800 down-tracks
    # total which is the upper bound of what this 10-core host can absorb.
    # Memory 6 GB generous for session state even with thousands of small rooms.
    #
    # RESERVATION 2 CPU + 2 GB — LiveKit is the critical path for live calls;
    # this guarantee means calls never degrade even when whisper + backend
    # saturate the rest of the box. Kernel cgroup enforces the floor.
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 6G
        reservations:
          cpus: '2.0'
          memory: 2G
    networks:
      - aiobi-public
      - default

  # ---------------------------------------------------------------------------
  # LiveKit Egress (enregistrement des rooms → upload MinIO)
  # ---------------------------------------------------------------------------
  livekit-egress:
    image: livekit/egress:v1.11.0
    restart: always
    environment:
      EGRESS_CONFIG_FILE: /egress-config.yaml
    volumes:
      - ./livekit-egress.yaml:/egress-config.yaml:ro
    depends_on:
      - redis
      - minio
    # Egress official minimum per instance: 4 CPU + 4 GB (upstream docs).
    # Room composite = full headless Chrome + FFmpeg pipeline (3x baseline
    # CPU vs a track-only egress). One simultaneous recording uses ~2-3
    # cores during encoding spikes.
    # Reservation 1 CPU / 1 GB so a recording already in progress never gets
    # starved by a concurrent whisper burst.
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Whisper load balancer (nginx) — round-robin across 4 whisper instances.
  # The summary service still calls http://whisper:8000/v1, unchanged: this
  # service keeps the name "whisper" and hides the horizontal scaling.
  # ---------------------------------------------------------------------------
  whisper:
    image: nginx:alpine
    restart: always
    volumes:
      - ./whisper-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - whisper-1
      - whisper-2
    # Internal-only LB (summary service -> whisper backends). Handful of
    # long-lived connections, negligible footprint.
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Whisper backends (faster-whisper-server — transcription ASR)
  #
  # 2 instances (reduced from 4 on 2026-04-18 as part of the dedup hotfix).
  # With the idempotency guards in Layers A/B/C/D the same audio is never
  # transcribed more than once, so concurrency = 2 real streams. Shared
  # volumes keep the IA model downloaded once and python deps resolved once.
  # ---------------------------------------------------------------------------
  # Resource caps are benchmark-informed (2026-04-18):
  #   - faster-whisper large-v3 int8 CPU peak RAM ~3 GB per worker (Systran
  #     benchmark). Cap at 6 GB gives a 2x safety margin for bursts (several
  #     concurrent requests queued inside one instance, e.g. during a retry
  #     storm that slipped past Layer A/B/C).
  #   - 4 logical threads (~2 physical cores on this 10-core Xeon without
  #     AVX-512). Faster-whisper default NUM_WORKERS=1 + CPU_THREADS=4 matches
  #     nicely. 2 instances x 4 threads = 8 threads for transcription, leaving
  #     12 threads protected for livekit/backend/everything else.
  #   - Reservation 1 CPU / 3 GB = the instance is never starved to below its
  #     single-stream serving capacity.
  whisper-1:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: always
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-large-v3
      - WHISPER__DEVICE=cpu
      - WHISPER__COMPUTE_TYPE=int8
      - WHISPER__VAD_FILTER=true
      - WHISPER__VAD_MIN_SILENCE_DURATION_MS=500
      - WHISPER__VAD_THRESHOLD=0.35
    volumes:
      - whisper-models:/root/.cache/huggingface
      - whisper-uv-cache:/root/.cache/uv
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 6G
        reservations:
          cpus: '1.0'
          memory: 3G
    networks:
      - default

  whisper-2:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: always
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-large-v3
      - WHISPER__DEVICE=cpu
      - WHISPER__COMPUTE_TYPE=int8
      - WHISPER__VAD_FILTER=true
      - WHISPER__VAD_MIN_SILENCE_DURATION_MS=500
      - WHISPER__VAD_THRESHOLD=0.35
    volumes:
      - whisper-models:/root/.cache/huggingface
      - whisper-uv-cache:/root/.cache/uv
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 6G
        reservations:
          cpus: '1.0'
          memory: 3G
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Redis pour le summary service (broker Celery + result backend)
  # ---------------------------------------------------------------------------
  redis-summary:
    image: redis:5
    restart: always
    # Celery broker for transcribe/summarize queues. Holds message payloads
    # transiently (minutes), not a cache, so 1G is ample.
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Summary service (FastAPI — transcription + resume IA)
  # ---------------------------------------------------------------------------
  summary:
    image: ${CI_REGISTRY_IMAGE:-aiobi-meet}/summary:${IMAGE_TAG:-latest}
    user: ${DOCKER_USER:-1000}
    restart: always
    env_file:
      - .env
      - env.d/summary
    depends_on:
      - redis-summary
      - whisper
      - minio
    # FastAPI entry point — light CPU/RAM unless under burst load from webhooks.
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Celery worker — transcription (queue: transcribe-queue)
  # ---------------------------------------------------------------------------
  celery-transcribe:
    image: ${CI_REGISTRY_IMAGE:-aiobi-meet}/summary:${IMAGE_TAG:-latest}
    user: ${DOCKER_USER:-1000}
    restart: always
    # prefork pool with concurrency=4 matches the 4 whisper backends: each celery
    # worker can hold an HTTP connection open to whisper, so 4 workers feed 4 whisper
    # instances in parallel via the nginx LB round-robin. RAM cost ~4x a solo worker
    # (~1.5-2 GB total) which is negligible on this host.
    command: celery -A summary.core.celery_worker worker --pool=prefork -l INFO -Q transcribe-queue --concurrency=4
    env_file:
      - .env
      - env.d/summary
    depends_on:
      - redis-summary
      - whisper
      - minio
    # Dispatcher only — all heavy CPU is delegated to whisper instances. Cap
    # is generous enough to hold 4 prefork children + one open HTTP connection
    # each (blocking during whisper compute).
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Celery worker — resume IA (queue: summarize-queue)
  # ---------------------------------------------------------------------------
  celery-summarize:
    image: ${CI_REGISTRY_IMAGE:-aiobi-meet}/summary:${IMAGE_TAG:-latest}
    user: ${DOCKER_USER:-1000}
    restart: always
    command: celery -A summary.core.celery_worker worker --pool=solo -l INFO -Q summarize-queue --concurrency=2
    env_file:
      - .env
      - env.d/summary
    # Solo pool + LLM disabled in prod today; minimal footprint. Will be
    # revisited when summarization is re-enabled (external LLM API).
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis-summary
    networks:
      - default

  # ===========================================================================
  # OBSERVABILITÉ — Stack Prometheus + Grafana (LOT M1)
  #
  # Principe général :
  #  - Tous les services observabilité bindent sur 127.0.0.1 uniquement
  #    (zéro exposition publique — accès via tunnel SSH seulement)
  #  - Scrape via réseau Docker `default` interne
  #  - Retention TSDB 30 jours
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Prometheus — serveur de métriques, scrape tous les exporters
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    restart: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/minio-token.txt:/etc/prometheus/minio-token.txt:ro
      - prometheus-data:/prometheus
    # Bind 0.0.0.0 : accessible depuis le reseau WireGuard (10.13.13.0/24).
    # UFW sur le host restreint l'acces au subnet VPN via la regle :
    #   ufw allow from 10.13.13.0/24 to any port 9090 comment 'Prometheus-VPN'
    # Meme pattern que GitLab (8929), Vault (18200), Teleport (33080) sur le meme host.
    ports:
      - "9090:9090"
    # 30-day TSDB retention on a moderate number of series; 1G covers most
    # scenarios. Can be raised if we add high-cardinality labels later.
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Grafana — UI dashboards + alerting
  # Provisioning auto des datasources + dashboards depuis le dossier monté
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    # Bind 0.0.0.0 : accessible depuis le reseau WireGuard (10.13.13.0/24).
    # UFW sur le host restreint l'acces au subnet VPN via la regle :
    #   ufw allow from 10.13.13.0/24 to any port 3000 comment 'Grafana-VPN'
    # Acces depuis un peer WG : http://10.13.13.1:3000
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - default

  # ---------------------------------------------------------------------------
  # node-exporter — métriques host (CPU, RAM, disk, network, load)
  # Mount /proc, /sys et / en read-only pour lire les fichiers système
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    restart: always
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    networks:
      - default

  # ---------------------------------------------------------------------------
  # cAdvisor — métriques par container (CPU, RAM, réseau, I/O)
  # Scrape automatique de TOUS les containers via Docker socket
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: always
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    networks:
      - default

  # ---------------------------------------------------------------------------
  # postgres-exporter — métriques PostgreSQL (queries, connexions, locks)
  # Se connecte en read-only à la DB principale
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: always
    environment:
      - DATA_SOURCE_URI=postgresql:5432/${POSTGRES_DB}?sslmode=disable
      - DATA_SOURCE_USER=${POSTGRES_USER}
      - DATA_SOURCE_PASS=${POSTGRES_PASSWORD}
    depends_on:
      - postgresql
    networks:
      - default

  # ---------------------------------------------------------------------------
  # redis-exporter (main) — métriques Redis principal (sessions, cache, broker Celery)
  # ---------------------------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:latest
    restart: always
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    networks:
      - default

  # ---------------------------------------------------------------------------
  # redis-summary-exporter — métriques Redis du summary service
  # ---------------------------------------------------------------------------
  redis-summary-exporter:
    image: oliver006/redis_exporter:latest
    restart: always
    environment:
      - REDIS_ADDR=redis://redis-summary:6379
    depends_on:
      - redis-summary
    networks:
      - default

  # ---------------------------------------------------------------------------
  # celery-exporter — events Celery (tasks sent/received/started/succeeded/failed)
  # Scrape le broker Redis summary (d'où partent tous les workers transcribe/summarize)
  # Pour monitorer le Celery "main" (Django backend), ajoute un 2e exporter
  # pointant sur redis://redis:6379 (optionnel, à ajouter si besoin)
  # ---------------------------------------------------------------------------
  celery-exporter:
    image: danihodovic/celery-exporter:latest
    restart: always
    environment:
      - CE_BROKER_URL=redis://redis-summary:6379/0
    depends_on:
      - redis-summary
    networks:
      - default

  # ---------------------------------------------------------------------------
  # nginx-exporter — métriques Nginx frontend (requests, upstream, codes)
  # Nécessite l'endpoint /stub_status configuré dans default.conf.template
  # ---------------------------------------------------------------------------
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    restart: always
    command:
      - --nginx.scrape-uri=http://frontend:8084/stub_status
    depends_on:
      - frontend
    networks:
      - default

  # ===========================================================================
  # LOGS CENTRALISES — Loki + Promtail (LOT M2)
  #
  # Loki stocke et indexe les logs par labels (container/service/project).
  # Promtail tail les logs Docker (/var/lib/docker/containers/*/*.log) et push.
  # Acces via Grafana > Explore > datasource Loki. Pas d'UI separee.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Loki — backend storage + API logs
  # Retention 14 jours, storage filesystem local persiste dans volume loki-data.
  # Pas expose sur le host : queries via reseau Docker interne par Grafana.
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.2.1
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Promtail — agent qui tail les logs Docker et les push a Loki
  # Lit les fichiers de log Docker via bind-mount /var/lib/docker/containers
  # (read-only), et le Docker socket pour service discovery des containers.
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.2.1
    restart: always
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Docker socket — pour service discovery des containers actifs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Logs Docker — tail des fichiers json-log (1 par container)
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Positions — fichier d'etat pour reprendre la ou on s'est arrete au restart
      - promtail-positions:/tmp
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    networks:
      - default

  # ===========================================================================
  # ERROR TRACKING — GlitchTip (LOT M2 phase 2)
  #
  # GlitchTip = fork open-source de Sentry (MIT), compatible SDK Sentry drop-in.
  # 4 services : web (UI + API), worker (Celery async), postgres (DB dediee),
  # redis (cache + broker Celery).
  #
  # UI admin : VPN only (bind 0.0.0.0:8002, UFW allow 10.13.13.0/24)
  # Ingestion browser : public via nginx frontend /glitchtip/api/
  # Ingestion backend : reseau Docker interne (glitchtip-web:8080)
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # glitchtip-postgres — DB dediee a GlitchTip (pas partagee avec Aïobi Meet)
  # Isolation totale : migrations schema GlitchTip ne peuvent pas casser
  # celles d'Aïobi Meet.
  # ---------------------------------------------------------------------------
  glitchtip-postgres:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_DB=glitchtip
      - POSTGRES_USER=glitchtip
      - POSTGRES_PASSWORD=${GLITCHTIP_POSTGRES_PASSWORD}
    volumes:
      - glitchtip-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Small dedicated DB, low traffic from glitchtip-web/worker only.
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - default

  # ---------------------------------------------------------------------------
  # glitchtip-redis — cache + broker Celery dediee (isolation du Redis Aïobi)
  # ---------------------------------------------------------------------------
  glitchtip-redis:
    image: redis:7-alpine
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    networks:
      - default

  # ---------------------------------------------------------------------------
  # glitchtip-migrate — oneshot qui applique les migrations Django GlitchTip
  # Tourne a chaque deploy, exit 0 une fois migrations terminees.
  # Le service 'web' attend que migrate ait fini (depends_on).
  # ---------------------------------------------------------------------------
  glitchtip-migrate:
    image: glitchtip/glitchtip:v4.2.1
    command: ./bin/run-migrate.sh
    environment:
      - DATABASE_URL=postgres://glitchtip:${GLITCHTIP_POSTGRES_PASSWORD}@glitchtip-postgres:5432/glitchtip
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY}
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
    networks:
      - default

  # ---------------------------------------------------------------------------
  # glitchtip-web — UI admin + API (ingestion + dashboard)
  # Port 8080 dans container (glitchtip v4 default), bind 8002 sur host (UFW restreint 10.13.13.0/24).
  # ---------------------------------------------------------------------------
  glitchtip-web:
    image: glitchtip/glitchtip:v4.2.1
    restart: always
    environment:
      - DATABASE_URL=postgres://glitchtip:${GLITCHTIP_POSTGRES_PASSWORD}@glitchtip-postgres:5432/glitchtip
      - REDIS_URL=redis://glitchtip-redis:6379/0
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY}
      # Domain utilise pour generer les URLs dans les emails + les DSN.
      # Pas encore de sous-domaine glitchtip.aiobi.world — on utilise le
      # chemin /glitchtip/ sous meet.aiobi.world.
      - GLITCHTIP_DOMAIN=https://meet.aiobi.world/glitchtip
      - DEFAULT_FROM_EMAIL=noreply@aiobi.world
      # SMTP — meme config que le backend Django (DJANGO_EMAIL_* dans les CI vars,
      # injectees dans .env via le script CI). GlitchTip utilise les noms Django
      # standard (sans prefixe), d'ou le mapping via ${EMAIL_*} du .env.
      # Indispensable pour allauth : le signup + password reset envoient des
      # emails de verification. Sans SMTP configure, /auth/signup renvoie 500.
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL}
      # Registration ouverte initialement (tu crees le premier compte admin
      # apres le deploy via http://10.13.13.1:8002/accounts/signup/).
      # UFW restreint deja l'acces au subnet VPN, donc registration=true est
      # safe. Une fois ton admin cree, tu pourras passer a false via les
      # settings UI de GlitchTip.
      - GLITCHTIP_ENABLE_USER_REGISTRATION=true
      - CELERY_WORKER_AUTOSCALE=1,3
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=10000
    ports:
      - "8002:8080"
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started
      glitchtip-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - default

  # ---------------------------------------------------------------------------
  # glitchtip-worker — Celery worker pour traitement async des events
  # (deduplication, notifications email, retention, etc.)
  # ---------------------------------------------------------------------------
  glitchtip-worker:
    image: glitchtip/glitchtip:v4.2.1
    restart: always
    command: ./bin/run-celery-with-beat.sh
    environment:
      - DATABASE_URL=postgres://glitchtip:${GLITCHTIP_POSTGRES_PASSWORD}@glitchtip-postgres:5432/glitchtip
      - REDIS_URL=redis://glitchtip-redis:6379/0
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY}
      - GLITCHTIP_DOMAIN=https://meet.aiobi.world/glitchtip
      - DEFAULT_FROM_EMAIL=noreply@aiobi.world
      # SMTP — le worker envoie les notifications d'alerte (nouvelle erreur,
      # regression, etc.). Meme config que le web container.
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL}
      - CELERY_WORKER_AUTOSCALE=1,3
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=10000
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started
      glitchtip-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - default

volumes:
  whisper-models:
  whisper-uv-cache:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-positions:
  glitchtip-pg-data:

networks:
  aiobi-public:
    external: true
  prod-app:
    name: prod-app
  default:

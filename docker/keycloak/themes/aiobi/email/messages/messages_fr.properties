emailVerificationBody=Bienvenue sur A\u00efobi Meet\!\n\nPour finaliser la cr\u00e9ation de votre compte, veuillez cliquer sur le lien ci-dessous afin de v\u00e9rifier votre adresse email\u00a0:\n\n{0}\n\nCe lien expire dans {3}.\n\nSi vous n''\u00eates pas \u00e0 l''origine de cette inscription, vous pouvez ignorer ce message.


emailVerificationBody=Welcome to Aïobi Meet!\n\nTo finish creating your account, please click the link below to verify your email address:\n\n{0}\n\nThis link will expire in {3}.\n\nIf you did not sign up, you can safely ignore this message.

emailVerificationBodyHtml=\
<h1 class="title" style="margin:0 0 12px 0;font-family:''Hanken Grotesk'',''Roboto'',Helvetica,Arial,sans-serif;font-size:24px;font-weight:700;color:#0F1010;line-height:1.3;">Welcome to Aïobi Meet!</h1>\
<p style="margin:0 0 16px 0;font-size:15px;line-height:1.6;color:#0F1010;">To finish creating your account and start using Aïobi Meet, please confirm your email address by clicking the button below.</p>\
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:8px 0 20px 0;">\
  <tr>\
    <td align="center" bgcolor="#a251fc" style="border-radius:8px;">\
      <a class="btn" href="{0}" target="_blank" style="display:inline-block;padding:14px 32px;font-family:''Roboto'',Helvetica,Arial,sans-serif;font-size:16px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:8px;">Verify my email</a>\
    </td>\
  </tr>\
</table>\
<p style="margin:0 0 12px 0;font-size:13px;line-height:1.6;color:#8b8ba3;">If the button doesn''t work, copy and paste this link into your browser:</p>\
<p style="margin:0 0 20px 0;font-size:13px;line-height:1.5;word-break:break-all;"><a href="{0}" style="color:#a251fc;text-decoration:none;">{0}</a></p>\
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td style="border-top:1px solid #ebebf0;padding-top:16px;"></td></tr></table>\
<p style="margin:12px 0 6px 0;font-size:13px;line-height:1.6;color:#8b8ba3;">This link expires in <strong>{3}</strong>.</p>\
<p style="margin:0 0 0 0;font-size:13px;line-height:1.6;color:#8b8ba3;">If you did not sign up, you can safely ignore this message.</p>

